<!--
  Paste this into the Supabase Dashboard:
  Authentication -> Email Templates -> "Confirm signup" AND "Magic Link"
  (paste into both — signInWithOtp() fires "Confirm signup" for an email
  Supabase hasn't seen before, and "Magic Link" for one it has, so both
  need to show the code or a first-time user gets a link-only email).

  {{ .Token }} is Supabase's raw OTP code. Default length is 6 digits, but
  this project has it configured to 8 — see Authentication -> Settings ->
  "Email OTP length" if you ever change it, and update the 8 boxes below
  to match.
-->
<div style="background-color:#f8fafc;padding:32px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:420px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
    <tr>
      <td style="padding:32px 32px 8px 32px;text-align:center;">
        <span style="font-size:15px;font-weight:600;color:#0f766e;letter-spacing:0.02em;">Benefy</span>
      </td>
    </tr>
    <tr>
      <td style="padding:8px 32px 0 32px;text-align:center;">
        <h1 style="margin:0;font-size:20px;font-weight:600;color:#0f172a;">Your sign-in code</h1>
        <p style="margin:8px 0 0 0;font-size:14px;color:#64748b;line-height:1.5;">
          Enter this code to continue to your benefits screening. It expires shortly, so grab it now.
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding:28px 32px;text-align:center;">
        <span style="display:inline-block;font-family:'SF Mono',Consolas,Menlo,monospace;font-size:32px;font-weight:700;letter-spacing:0.35em;color:#0f172a;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:10px;padding:16px 12px;">
          {{ .Token }}
        </span>
      </td>
    </tr>
    <tr>
      <td style="padding:0 32px 32px 32px;text-align:center;">
        <p style="margin:0;font-size:12px;color:#94a3b8;line-height:1.5;">
          Didn&rsquo;t request this? You can safely ignore this email &mdash; no account changes will be made.
        </p>
      </td>
    </tr>
  </table>
  <p style="max-width:420px;margin:16px auto 0 auto;text-align:center;font-size:11px;color:#cbd5e1;">
    Benefy &middot; Built for San Francisco residents
  </p>
</div>
